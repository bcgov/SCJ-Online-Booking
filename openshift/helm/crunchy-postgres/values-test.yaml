fullnameOverride: scjob-crunchy

postgresVersion: 17

instances:
  name: postgres
  replicas: 2
  dataVolumeClaimSpec:
    storage: 2Gi
  requests:
    cpu: 100m

pgBackRest:
  retention: "30" # Ideally a larger number such as 30 backups/days
  repos:
    volume:
      storage: 2Gi
  s3:
    enabled: true
    bucket: "scjobtest"
    endpoint: "nrs.objectstore.gov.bc.ca"

proxy:
  pgBouncer:
    replicas: 1

pgmonitor:
  namespace: bc7c5c #The high level namespace of your project without the -tools -dev, etc part.
